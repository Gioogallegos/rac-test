<ion-header>
  <ion-toolbar>
    <ion-title>Usuarios</ion-title>
    <ion-buttons slot="end">
      <ion-button fill="clear" (click)="goToFavorites()" aria-label="Favoritos">
        <ion-icon name="star" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>

  <ion-toolbar>
    <ion-searchbar placeholder="Buscar por nombre" (ionInput)="search$.next($event.detail.value ?? '')">
    </ion-searchbar>

    <!-- Toggle de orden -->
    <ion-segment value="asc" (ionChange)="setSort($event.detail.value)">
      <ion-segment-button value="asc">A → Z</ion-segment-button>
      <ion-segment-button value="desc">Z → A</ion-segment-button>
    </ion-segment>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ng-container *ngIf="(filtered$ | async) as users; else loading">
    <ion-list>
      <ion-item *ngFor="let u of users; trackBy: trackById" button (click)="openDetails(u.id)">
        <ion-avatar slot="start">
          <ion-label class="avatar-label">{{ getInitials(u.name) }}</ion-label>
        </ion-avatar>
        <ion-label>
          <h2>{{ u.name }}</h2>
          <p class="muted">{{ u.email }}</p>
        </ion-label>
        <ion-icon name="chevron-forward" slot="end"></ion-icon>
      </ion-item>
    </ion-list>

    <div *ngIf="users.length === 0" class="empty">
      No se encontraron usuarios
    </div>
  </ng-container>

  <ng-template #loading>
    <div class="center">
      <ion-spinner name="crescent"></ion-spinner>
    </div>
  </ng-template>
</ion-content>
